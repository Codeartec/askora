services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: askora
      POSTGRES_USER: ${DB_USER:-askora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-askora_secret}
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-askora}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - askora-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-askora}:${DB_PASSWORD:-askora_secret}@db:5432/askora
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/api/auth/google/callback}
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    restart: unless-stopped
    networks:
      - askora-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${API_URL:-/api}
        VITE_WS_URL: ${WS_URL:-}
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - askora-net

volumes:
  pgdata:

networks:
  askora-net:
    name: askora-net